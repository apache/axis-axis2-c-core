#
# Axis2/C HTTPS Site Configuration for Debian/Ubuntu System Apache
#
# This is a Debian-style sites-available config that adds Axis2/C HTTP/2 JSON
# services on port 443 (HTTPS) alongside any existing port 80 sites.
#
# Adapted from docs/userguide/httpd.conf (monolithic config for /usr/local/apache2)
# for use with the Debian apache2 package and its sites-enabled/ pattern.
#
# Install:
#   sudo cp axis2-services.conf /etc/apache2/sites-available/
#   sudo a2enmod ssl headers http2
#   sudo a2ensite axis2-services
#   sudo apache2ctl configtest
#   sudo systemctl restart apache2
#
# Prerequisites:
#   - Axis2/C installed at /usr/local/axis2c (make install)
#   - SSL cert at /etc/ssl/certs/axis2-server.crt
#   - SSL key at /etc/ssl/private/axis2-server.key
#   - /var/log/axis2c/ owned by www-data
#   - /usr/local/axis2c/lib in ldconfig (see /etc/ld.so.conf.d/axis2c.conf)
#

# =============================================================================
# AXIS2/C MODULE AND CONFIGURATION
# =============================================================================

# Load Axis2/C module (core Apache modules are managed via a2enmod)
LoadModule axis2_module /usr/local/axis2c/lib/libmod_axis2.so

# Axis2/C repository and logging
Axis2RepoPath /usr/local/axis2c
Axis2LogFile /var/log/axis2c/axis2.log
Axis2LogLevel info

# =============================================================================
# HTTP/2 CONFIGURATION
# =============================================================================

# Ubuntu 22.04 ships mod_http2.so (enable via: sudo a2enmod http2)
<IfModule mod_http2.c>
    H2WindowSize 65536
    H2MaxWorkers 256
    H2MaxSessionStreams 100
    H2StreamMaxMemSize 104857600
    H2StreamTimeout 300

    # Security: HTTP/2 only over TLS 1.2+
    H2ModernTLSOnly on
    H2Upgrade off
    H2Direct on
</IfModule>

# =============================================================================
# DEFENSE IN DEPTH: GLOBAL REQUEST LIMITS
# Apache enforces these limits BEFORE payloads reach Axis2/C code
# =============================================================================

# Global default: 10MB max request body (matches Axis2/C max_buffer)
LimitRequestBody 10485760

# Limit request line (URL + method + protocol) - prevents long URL attacks
LimitRequestLine 8190

# Limit total header fields - prevents header flooding
LimitRequestFields 100

# Limit individual header size - prevents header overflow attacks
LimitRequestFieldSize 8190

# Request timeout protection (slowloris defense)
<IfModule reqtimeout_module>
    RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
</IfModule>

# OCSP Stapling cache (must be outside VirtualHost)
# NOTE: Disabled — self-signed certificates have no OCSP responder.
# Re-enable when using a CA-signed certificate.
#<IfModule mod_ssl.c>
#    SSLStaplingCache shmcb:/tmp/stapling_cache(128000)
#</IfModule>

# =============================================================================
# HTTPS VIRTUAL HOST WITH HTTP/2
# =============================================================================
<VirtualHost *:443>
    ServerName penguin.alphatheory.local:443
    DocumentRoot /var/www/html

    # HTTP/2 first, HTTP/1.1 fallback
    Protocols h2 http/1.1

    # =========================================================================
    # SSL/TLS CONFIGURATION
    # =========================================================================
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/axis2-server.crt
    SSLCertificateKeyFile /etc/ssl/private/axis2-server.key

    # TLS 1.2+ required for HTTP/2
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    # Modern cipher suites for HTTP/2
    SSLCipherSuite ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS
    SSLHonorCipherOrder off

    # OCSP Stapling — disabled for self-signed certs (no OCSP responder)
    # SSLUseStapling on

    # =========================================================================
    # SECURITY HEADERS
    # =========================================================================
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY

    # =========================================================================
    # AXIS2/C SERVICES HANDLER
    # =========================================================================
    <Location /services>
        SetHandler axis2_module
        SSLRequireSSL

        # CORS headers for API access
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Accept"
    </Location>

    # =========================================================================
    # PER-SERVICE REQUEST LIMITS (Defense in Depth)
    # These limits are enforced by Apache BEFORE Axis2/C code executes
    # =========================================================================

    # Financial Benchmark Service - Enterprise payloads up to 10MB
    <Location /services/FinancialBenchmarkService>
        LimitRequestBody 10485760
        Header always set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>

    # Big Data H2 Service - Large payloads up to 50MB
    <Location /services/BigDataH2Service>
        LimitRequestBody 52428800
        Header always set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>

    # Login Service - Authentication payloads are small
    <Location /services/LoginService>
        LimitRequestBody 65536
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Content-Security-Policy "default-src 'self'"
    </Location>

    # Test WS Service - XSS demonstration with small payloads
    <Location /services/TestwsService>
        LimitRequestBody 1048576
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'none'"
    </Location>

</VirtualHost>
